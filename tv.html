<!DOCTYPE html>
<html>
<head>
  <title>Lion Madness '26 - THE ARENA</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #050505; color: #fff; font-family: 'Oswald', sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
    
    /* Giga Chad Aesthetics */
    .gold-text { color: #D4AF37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); text-transform: uppercase; letter-spacing: 4px; }
    .blood-text { color: #8A0303; text-shadow: 0 0 10px rgba(138, 3, 3, 0.8); }
    
    /* Matchup View */
    #matchup-view { margin-top: 15vh; }
    .matchup-container { display: flex; justify-content: space-around; align-items: center; margin-top: 5vh; }
    .competitor { font-size: 5em; font-weight: 700; background: linear-gradient(145deg, #111, #000); padding: 50px; border-radius: 10px; width: 35%; border: 2px solid #D4AF37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); text-transform: uppercase; }
    .vs { font-size: 5em; font-weight: 700; font-style: italic; }
    
    /* Bracket View */
    #bracket-view { margin-top: 2vh; }
    .bracket-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 30px; }
    .bracket-slot { background: #111; border: 1px solid #D4AF37; padding: 10px; width: 20%; font-size: 1.2em; border-radius: 4px; box-shadow: inset 0 0 10px #000; }
    .bracket-slot:nth-child(even) { margin-bottom: 20px; border-bottom: 3px solid #8A0303; } /* Groups pairs visually */

    /* Controls */
    .audio-controls { position: fixed; bottom: 20px; right: 20px; }
    button { background: #111; color: #D4AF37; border: 1px solid #D4AF37; padding: 15px 25px; font-family: 'Oswald'; font-size: 1.2em; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
    button:hover { background: #D4AF37; color: #000; box-shadow: 0 0 15px #D4AF37; }
  </style>
</head>
<body>
  
  <audio id="bg-music" loop src="bg-music.mp3"></audio>
  <audio id="cheer-sfx" src="cheer.mp3"></audio>
  
  <div id="matchup-view" style="display: none;">
      <h1 class="gold-text" style="font-size: 3em;">CURRENT DOMINATION</h1>
      <div class="matchup-container">
        <div id="team1" class="competitor">TBD</div>
        <div class="vs blood-text">VS</div>
        <div id="team2" class="competitor">TBD</div>
      </div>
  </div>

  <div id="bracket-view" style="display: none;">
      <h1 class="gold-text" style="font-size: 3em;">THE SIGMA BRACKET</h1>
      <h2 style="color: #aaa; letter-spacing: 2px;">ROUND OF 64 AWAITS</h2>
      <div id="bracket-container" class="bracket-grid">
          </div>
  </div>

  <div class="audio-controls">
      <button id="audio-btn" onclick="toggleAudio()">🔊 START / UNMUTE BEATS</button>
  </div>

  <script src="logic.js"></script>
  <script>
    // Audio Toggle Logic
    function toggleAudio() {
        const bgm = document.getElementById('bg-music');
        const btn = document.getElementById('audio-btn');
        if(bgm.paused || bgm.muted) {
            bgm.muted = false; bgm.play().catch(e => console.log("Audio play blocked by browser.")); 
            btn.innerText = "🔇 MUTE MASCULINE BEATS";
        } else {
            bgm.muted = true; 
            btn.innerText = "🔊 UNMUTE MASCULINE BEATS";
        }
    }

    // Listen for real-time changes
    db.ref('tournament').on('value', (snapshot) => {
      const data = snapshot.val();
      if(data) {
        
        // 1. Handle Display Views
        if(data.view === "BRACKET") {
            document.getElementById('matchup-view').style.display = 'none';
            document.getElementById('bracket-view').style.display = 'block';
            
            // Render the Bracket dynamically
            const bracketDiv = document.getElementById('bracket-container');
            bracketDiv.innerHTML = ""; // clear old
            data.mainBracket.forEach(team => {
                let div = document.createElement('div');
                div.className = 'bracket-slot';
                div.innerText = team;
                bracketDiv.appendChild(div);
            });

        } else if (data.view === "MATCHUP") {
            document.getElementById('bracket-view').style.display = 'none';
            document.getElementById('matchup-view').style.display = 'block';
        }

        // 2. Handle Matchup Data
        if(data.status === "FIRST_FOUR") {
            let t1 = data.firstFour[data.currentMatchIndex * 2];
            let t2 = data.firstFour[(data.currentMatchIndex * 2) + 1];
            
            // Play SFX if the matchup changes while viewing it
            if(document.getElementById('team1').innerText !== t1 && document.getElementById('team1').innerText !== "TBD") {
                document.getElementById('cheer-sfx').play();
            }

            document.getElementById('team1').innerText = t1 || "TBD";
            document.getElementById('team2').innerText = t2 || "TBD";
        }
      }
    });
  </script>
</body>
</html>
